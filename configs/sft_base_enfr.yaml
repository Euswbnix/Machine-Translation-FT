# SFT — Base v1.1 en-fr on quality-filtered top-1M v2 data
#
# Strategy: load Base v1.1 averaged.pt (global_step=105K) with
# --reset-optimizer. Scheduler resumes at late-Noam (~1.4e-4 effective
# peak), which is in the standard SFT LR band (10-20% of pretraining
# peak 7e-4). max_steps = 105K + 10K = 115K → 10K SFT steps.
#
# Data: ../Machine-Translation-SFT/data/sft_train.{en,fr} (top-1M by
# CometKiwi-22 score from v2's 30M corpus).
# Eval: same valid/test as v1.1 (newstest2013/2014).

model:
  d_model: 512
  n_heads: 8
  n_encoder_layers: 6
  n_decoder_layers: 6
  d_ff: 2048
  dropout: 0.1
  max_seq_len: 256
  vocab_size: 32000
  share_embeddings: true

training:
  batch_size: 24576
  max_sentences: 192
  accumulate_steps: 4

  max_steps: 115000           # 105K (loaded) + 10K SFT
  warmup_steps: 4000          # bypassed; sched is past warmup
  lr: 0.0007
  lr_scale: 1.0
  min_lr: 1.0e-5

  label_smoothing: 0.1
  clip_grad_norm: 1.0

  fp16: false
  bf16: true

  seed: 42

  save_interval: 2000
  eval_interval: 2000
  eval_interval_min: 1000
  eval_loss_high: 4.0
  eval_loss_low: 2.5
  log_interval: 100

  patience: 5
  early_stopping: true
  min_steps_before_early_stop: 110000
  emergency_save_interval: 500

  loss_spike_ratio: 1.3
  loss_ema_alpha: 0.005

data:
  src_lang: en
  tgt_lang: fr
  train_src: ../Machine-Translation-SFT/data/sft_train.en
  train_tgt: ../Machine-Translation-SFT/data/sft_train.fr
  valid_src: data_enfr_v1/valid.en
  valid_tgt: data_enfr_v1/valid.fr
  test_src: data_enfr_v1/test.en
  test_tgt: data_enfr_v1/test.fr
  spm_model: data_enfr_v1/spm_enfr_v1_fixed.model
  max_tokens: 256
  num_workers: 4

inference:
  beam_size: 5
  length_penalty: 1.0
  max_decode_len: 256

checkpoint:
  dir: ../Machine-Translation-SFT/checkpoints/sft_base_enfr
  keep_last: 5

logging:
  swanlab:
    enabled: true
    project: wmt-mt-sft
    experiment: sft_base_enfr
    mode: cloud
